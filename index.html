<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Video Generator</title>
<meta name="google-site-verification" content="2573AZQdlQ-b0S_XZhp1fgMJihuMJ5xkAq-NdNwGmRo" />
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    text-align: center;
}

/* TOP BAR (your name) */
.topbar {
    position: fixed;
    top: 0;
    width: 100%;
    background: #020617;
    padding: 10px;
    font-size: 13px;
    color: #00ff88;
    border-bottom: 1px solid #222;
}

/* MAIN */
.container {
    margin-top: 100px;
}

h1 {
    font-size: 32px;
}

p {
    color: #aaa;
    margin-bottom: 25px;
}

/* INPUT */
input {
    padding: 12px;
    width: 75%;
    max-width: 320px;
    border-radius: 8px;
    border: none;
    outline: none;
    font-size: 15px;
}

/* BUTTON */
button {
    margin-top: 15px;
    padding: 12px 25px;
    border: none;
    border-radius: 8px;
    background: #00ff88;
    color: black;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #00cc6a;
}

/* LOADING */
.loading {
    margin-top: 20px;
    display: none;
    color: #00ff88;
}

/* RESULTS */
.results {
    margin-top: 30px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
}

video {
    width: 200px;
    border-radius: 10px;
}

/* FOOTER */
.footer {
    margin-top: 50px;
    font-size: 12px;
    color: #666;
}
</style>
</head>

<body>

<!-- YOUR NAME (VISIBLE ALWAYS) -->
<div class="topbar">
    Made by Aryan | Student | Digital Creator 🚀
</div>

<div class="container">
    <h1>🎬 AI Video Generator</h1>
    <p>Create short clips instantly using AI</p>

    <input id="prompt" placeholder="Enter prompt (cars, money, nature)">
    <br>
    <button id="generateBtn">🎬 Generate Video</button>

    <div class="loading" id="loading">⚡ Generating clips...</div>

    <div class="results" id="results"></div>

    <div class="footer">
        © 2026 Aryan | Built with passion 💻
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
